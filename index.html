<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⏱️ Samayam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        
        body { font-family: 'Inter', system_ui, sans-serif; }
        .logo-font { font-family: 'Space Grotesk', sans-serif; }

        .calendar-day {
            min-height: 92px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .calendar-day:hover { background-color: #161b22; transform: scale(1.03); }
        .calendar-day.selected { background-color: #1f2937; ring: 2px solid #58a6ff; }

        .timeline-container {
            position: relative;
            min-height: 1100px;
        }
        .slot-bar {
            position: absolute;
            left: 68px;
            right: 12px;
            background: #21262d;
            border-radius: 12px;
            padding: 10px 14px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .slot-bar:hover { background: #30363d; }

        .time-label {
            position: absolute;
            left: 0;
            width: 58px;
            text-align: right;
            font-family: monospace;
            font-size: 12px;
            color: #8b949e;
        }

        /* Week View - Screenshot style */
        .week-day-card {
            background: #161b22;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid #21262d;
        }
        .week-event-bar {
            background: #21262d;
            border-radius: 10px;
            padding: 10px 14px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .week-event-bar:hover {
            background: #30363d;
        }
    </style>
</head>
<body class="bg-[#0d1117] text-[#c9d1d9] min-h-screen">
    <!-- HEADER -->
    <header class="sticky top-0 z-50 bg-[#0d1117] border-b border-[#21262d]">
        <div class="max-w-screen-2xl mx-auto px-4 py-3.5 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-gradient-to-br from-[#58a6ff] to-[#1f6feb] rounded-2xl flex items-center justify-center text-2xl">⏱️</div>
                <h1 class="text-2xl font-semibold tracking-tighter logo-font text-white">Samayam</h1>
                <span class="px-3 py-0.5 text-xs font-medium bg-[#21262d] text-[#58a6ff] rounded-full border border-[#58a6ff]/30">Beta 1.0</span>
            </div>

            <div class="flex bg-[#161b22] rounded-3xl p-1 text-sm font-medium border border-[#21262d] overflow-x-auto whitespace-nowrap max-w-[calc(100%-140px)]">
                <button onclick="switchTab(0)" id="tab-0" class="tab-btn px-4 py-2.5 rounded-3xl text-xs sm:text-sm">📅 Cal</button>
                <button onclick="switchTab(1)" id="tab-1" class="tab-btn px-4 py-2.5 rounded-3xl text-xs sm:text-sm">🗓️ Day</button>
                <button onclick="switchTab(2)" id="tab-2" class="tab-btn px-4 py-2.5 rounded-3xl text-xs sm:text-sm">📆 Week</button>
                <button onclick="switchTab(3)" id="tab-3" class="tab-btn px-4 py-2.5 rounded-3xl text-xs sm:text-sm">📋 Events</button>
                <button onclick="switchTab(4)" id="tab-4" class="tab-btn px-4 py-2.5 rounded-3xl text-xs sm:text-sm">🛎️ Alarms</button>
            </div>

            <button onclick="showAddEventModal()" 
                    class="bg-[#58a6ff] hover:bg-[#1f6feb] text-white w-9 h-9 flex items-center justify-center rounded-2xl text-xl shadow-lg active:scale-95">＋</button>
        </div>
    </header>

    <div class="max-w-screen-2xl mx-auto px-4 py-6">
        <!-- Calendar View -->
        <div id="view-0" class="view">
            <div class="flex justify-between items-center mb-6">
                <div class="flex items-center gap-3">
                    <button onclick="prevMonth()" class="w-9 h-9 flex items-center justify-center text-3xl hover:bg-[#21262d] rounded-2xl active:scale-95">‹</button>
                    <h2 id="month-title" class="text-2xl font-semibold text-white"></h2>
                    <button onclick="nextMonth()" class="w-9 h-9 flex items-center justify-center text-3xl hover:bg-[#21262d] rounded-2xl active:scale-95">›</button>
                </div>
                <button onclick="goToToday()" class="px-5 py-2 bg-[#21262d] rounded-2xl text-sm font-medium">Today</button>
            </div>

            <div class="grid grid-cols-7 gap-px bg-[#21262d] rounded-3xl overflow-hidden shadow-xl">
                <div class="bg-[#161b22] py-3 text-center text-xs font-medium text-[#8b949e]">S</div>
                <div class="bg-[#161b22] py-3 text-center text-xs font-medium text-[#8b949e]">M</div>
                <div class="bg-[#161b22] py-3 text-center text-xs font-medium text-[#8b949e]">T</div>
                <div class="bg-[#161b22] py-3 text-center text-xs font-medium text-[#8b949e]">W</div>
                <div class="bg-[#161b22] py-3 text-center text-xs font-medium text-[#8b949e]">T</div>
                <div class="bg-[#161b22] py-3 text-center text-xs font-medium text-[#8b949e]">F</div>
                <div class="bg-[#161b22] py-3 text-center text-xs font-medium text-[#8b949e]">S</div>
                <div id="calendar-grid" class="grid grid-cols-7 col-span-7 gap-px"></div>
            </div>

            <div class="mt-8 lg:hidden bg-[#161b22] rounded-3xl p-6">
                <h3 id="sidebar-date-mobile" class="text-lg font-semibold mb-4"></h3>
                <div id="sidebar-events-mobile" class="space-y-4"></div>
            </div>
        </div>

        <!-- Day Plan -->
        <div id="view-1" class="view hidden">
            <div class="flex flex-col sm:flex-row gap-4 mb-6 items-start sm:items-center justify-between">
                <div>
                    <h2 id="day-plan-date" class="text-2xl font-semibold"></h2>
                    <p id="day-plan-dayname" class="text-[#8b949e]"></p>
                </div>
                <div class="flex flex-wrap gap-2">
                    <button onclick="prevDayPlan()" class="px-5 py-2.5 bg-[#21262d] rounded-2xl text-sm active:scale-95">← Prev</button>
                    <button onclick="nextDayPlan()" class="px-5 py-2.5 bg-[#21262d] rounded-2xl text-sm active:scale-95">Next →</button>
                    <button onclick="goToTodayInDayPlan()" class="px-5 py-2.5 bg-[#21262d] rounded-2xl text-sm active:scale-95">Today</button>
                    <button onclick="openScheduleTemplateModal()" class="px-5 py-2.5 bg-[#21262d] hover:bg-[#30363d] rounded-2xl text-sm flex items-center gap-1.5 active:scale-95">📋 Schedule</button>
                    <button onclick="showAddEventModal()" class="px-5 py-2.5 bg-[#58a6ff] hover:bg-[#1f6feb] text-white rounded-2xl flex items-center gap-1.5 active:scale-95"><span class="text-lg">+</span> Slot</button>
                </div>
            </div>

            <div class="bg-[#161b22] rounded-3xl border border-[#21262d] overflow-hidden">
                <div id="day-plan-timeline" class="relative timeline-container"></div>
            </div>
        </div>

        <!-- Week View - Fixed to match screenshot style -->
        <div id="view-2" class="view hidden">
            <div class="flex items-center justify-between mb-6">
                <h2 id="week-title" class="text-2xl font-semibold"></h2>
                <div class="flex gap-3">
                    <button onclick="prevWeek()" class="px-5 py-2.5 bg-[#21262d] rounded-2xl text-sm active:scale-95">← Previous</button>
                    <button onclick="nextWeek()" class="px-5 py-2.5 bg-[#21262d] rounded-2xl text-sm active:scale-95">Next →</button>
                </div>
            </div>
            <div id="week-grid" class="grid grid-cols-1 md:grid-cols-7 gap-4"></div>
        </div>

        <!-- All Events & Alarms (kept simple) -->
        <div id="view-3" class="view hidden">
            <h2 class="text-2xl font-semibold mb-6">All Events</h2>
            <input id="search-input" placeholder="Search events..." class="w-full bg-[#21262d] border border-transparent focus:border-[#58a6ff] rounded-2xl px-5 py-4 mb-6 outline-none" onkeyup="if(event.key==='Enter') filterEvents()">
            <div class="overflow-x-auto">
                <table class="w-full text-sm">
                    <thead><tr class="border-b border-[#21262d]"><th class="text-left py-4 px-6">Date</th><th class="text-left py-4 px-6">Time</th><th class="text-left py-4 px-6">Event</th><th class="text-left py-4 px-6">Alarm</th><th class="w-20"></th></tr></thead>
                    <tbody id="events-table" class="divide-y divide-[#21262d]"></tbody>
                </table>
            </div>
        </div>

        <div id="view-4" class="view hidden">
            <h2 class="text-2xl font-semibold mb-6 flex items-center gap-3">🛎️ Active Alarms <span id="alarm-count-badge" class="bg-emerald-400 text-black px-3 py-1 text-xs rounded-3xl font-medium">0</span></h2>
            <div id="alarms-list" class="space-y-4"></div>
        </div>
    </div>

    <!-- Event Modal with Recurring -->
    <div id="event-modal" onclick="if(event.target.id==='event-modal') hideModal()" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[100]">
        <div onclick="event.stopImmediatePropagation()" class="bg-[#161b22] w-full max-w-lg mx-4 rounded-3xl overflow-hidden">
            <div class="p-6 sm:p-8">
                <h3 id="modal-title" class="text-xl sm:text-2xl font-semibold mb-6">New Event</h3>
                <div class="space-y-6">
                    <input id="event-title" type="text" placeholder="Event title" class="w-full bg-[#21262d] rounded-2xl px-5 py-4 outline-none focus:border-[#58a6ff]">
                    <div class="grid grid-cols-2 gap-4">
                        <div><label class="block text-xs text-[#8b949e] mb-2">Date</label><input id="event-date" type="date" class="w-full bg-[#21262d] rounded-2xl px-5 py-4 outline-none"></div>
                        <div><label class="block text-xs text-[#8b949e] mb-2">Alarm</label><select id="event-alarm" class="w-full bg-[#21262d] rounded-2xl px-5 py-4 outline-none"><option value="0">No alarm</option><option value="5">5 min</option><option value="10" selected>10 min</option><option value="15">15 min</option><option value="30">30 min</option><option value="60">1 hr</option></select></div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div><label class="block text-xs text-[#8b949e] mb-2">Start</label><input id="event-start" type="time" value="09:00" class="w-full bg-[#21262d] rounded-2xl px-5 py-4 outline-none"></div>
                        <div><label class="block text-xs text-[#8b949e] mb-2">End</label><input id="event-end" type="time" value="10:00" class="w-full bg-[#21262d] rounded-2xl px-5 py-4 outline-none"></div>
                    </div>
                    <div>
                        <label class="block text-xs text-[#8b949e] mb-2">Recurring</label>
                        <select id="event-recurring" class="w-full bg-[#21262d] rounded-2xl px-5 py-4 outline-none">
                            <option value="none">None</option>
                            <option value="daily">Daily</option>
                            <option value="weekly">Weekly</option>
                            <option value="monthly">Monthly</option>
                        </select>
                    </div>
                    <textarea id="event-desc" rows="3" placeholder="Notes (optional)" class="w-full bg-[#21262d] rounded-3xl px-5 py-4 outline-none resize-none"></textarea>
                </div>
            </div>
            <div class="p-6 border-t border-[#21262d] flex gap-3">
                <button onclick="hideModal()" class="flex-1 py-4 text-[#8b949e]">Cancel</button>
                <button onclick="saveEvent()" class="flex-1 py-4 bg-[#58a6ff] hover:bg-[#1f6feb] text-white rounded-2xl font-medium">Save Event</button>
            </div>
        </div>
    </div>

    <!-- Schedule Template Modal with Multi-day support -->
    <div id="schedule-template-modal" onclick="if(event.target.id==='schedule-template-modal') hideScheduleModal()" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[110]">
        <div onclick="event.stopImmediatePropagation()" class="bg-[#161b22] w-full max-w-2xl mx-4 rounded-3xl overflow-hidden">
            <div class="p-6">
                <div class="flex justify-between mb-6">
                    <h3 class="text-xl font-semibold">Manage Schedules</h3>
                    <button onclick="hideScheduleModal()" class="text-2xl text-[#8b949e]">✕</button>
                </div>

                <div class="flex gap-2 mb-4 overflow-x-auto pb-2">
                    <button onclick="createNewTemplate()" class="px-4 py-2 bg-[#21262d] hover:bg-[#30363d] rounded-2xl text-sm whitespace-nowrap">+ New Schedule</button>
                    <div id="template-list" class="flex gap-2"></div>
                </div>

                <input id="current-template-name" type="text" class="w-full bg-[#21262d] rounded-2xl px-5 py-3 outline-none text-base mb-4" placeholder="Schedule name">

                <div id="template-slots-list" class="space-y-3 max-h-[380px] overflow-auto pr-2"></div>

                <div class="mt-8 flex gap-3">
                    <button onclick="addTemplateSlot()" class="flex-1 py-4 border border-[#30363d] rounded-2xl text-sm">+ Add Slot</button>
                    <button onclick="applyCurrentTemplate()" class="flex-1 py-4 bg-[#58a6ff] hover:bg-[#1f6feb] text-white rounded-2xl text-sm">Apply to Current Day</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 bg-[#21262d] border border-[#58a6ff] px-6 py-3.5 rounded-3xl shadow-2xl z-[200] text-sm">
        <span id="toast-text"></span>
    </div>

    <script>
        let events = []
        let templates = []
        let currentTemplateIndex = 0
        let currentMonth = new Date().getMonth()
        let currentYear = new Date().getFullYear()
        let currentDayPlanDate = new Date().toISOString().slice(0, 10)
        let currentWeekStart = new Date()
        let selectedDateForSidebar = new Date().toISOString().slice(0, 10)
        let editingEventId = null

        function loadData() {
            const savedEvents = localStorage.getItem('samayamEvents')
            events = savedEvents ? JSON.parse(savedEvents) : []

            const savedTemplates = localStorage.getItem('samayamTemplates')
            templates = savedTemplates ? JSON.parse(savedTemplates) : [
                { id: 1, name: "Work Week", slots: [
                    {title: "Morning Routine", start: "06:30", end: "07:30", days: "Mon-Fri"},
                    {title: "Deep Work", start: "09:00", end: "12:00", days: "Mon-Fri"},
                    {title: "Lunch", start: "13:00", end: "14:00", days: "Mon-Fri"}
                ] }
            ]
        }

        function saveData() {
            localStorage.setItem('samayamEvents', JSON.stringify(events))
            localStorage.setItem('samayamTemplates', JSON.stringify(templates))
        }

        function showToast(msg, time = 2000) {
            const toast = document.getElementById('toast')
            document.getElementById('toast-text').innerHTML = msg
            toast.classList.remove('hidden')
            setTimeout(() => toast.classList.add('hidden'), time)
        }

        // Calendar
        function renderCalendar() {
            const grid = document.getElementById('calendar-grid')
            grid.innerHTML = ''

            const firstDay = new Date(currentYear, currentMonth, 1).getDay()
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate()

            document.getElementById('month-title').textContent = 
                new Date(currentYear, currentMonth).toLocaleString('default', { month: 'long', year: 'numeric' })

            for (let i = firstDay - 1; i >= 0; i--) {
                const el = document.createElement('div')
                el.className = 'calendar-day bg-[#161b22] p-3 opacity-40 text-center text-sm'
                el.textContent = new Date(currentYear, currentMonth, 0).getDate() - i
                grid.appendChild(el)
            }

            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`
                const isToday = dateStr === new Date().toISOString().slice(0, 10)
                const isSelected = dateStr === selectedDateForSidebar

                const dayEl = document.createElement('div')
                dayEl.className = `calendar-day bg-[#161b22] p-3 flex flex-col cursor-pointer border-b border-r border-[#21262d] ${isToday ? 'ring-2 ring-[#58a6ff]' : ''} ${isSelected ? 'selected' : ''}`
                dayEl.innerHTML = `<div class="text-center font-medium ${isToday ? 'text-[#58a6ff]' : ''}">${day}</div>`

                const count = events.filter(e => e.date === dateStr).length
                if (count) {
                    const preview = document.createElement('div')
                    preview.className = 'mt-auto flex justify-center gap-1'
                    preview.innerHTML = `<span class="text-xs bg-[#58a6ff]/10 text-[#58a6ff] px-2 py-px rounded-full">${count}</span>`
                    dayEl.appendChild(preview)
                }

                dayEl.onclick = () => {
                    selectedDateForSidebar = dateStr
                    renderCalendar()
                    renderSidebar()
                }
                grid.appendChild(dayEl)
            }
        }

        function renderSidebar() {
            const container = document.getElementById('sidebar-events-mobile')
            container.innerHTML = ''

            const dateObj = new Date(selectedDateForSidebar)
            document.getElementById('sidebar-date-mobile').textContent = 
                `Events · ${dateObj.toLocaleDateString('en-IN', {weekday:'long', day:'numeric', month:'short'})}`

            const dayEvents = events.filter(e => e.date === selectedDateForSidebar)

            if (dayEvents.length === 0) {
                container.innerHTML = `<div class="text-center py-8 text-[#8b949e]">No events</div>`
                return
            }

            dayEvents.forEach(ev => {
                const div = document.createElement('div')
                div.className = 'bg-[#21262d] rounded-2xl p-4 cursor-pointer hover:bg-[#30363d]'
                div.onclick = () => editEvent(ev.id)
                div.innerHTML = `
                    <div class="flex justify-between text-sm">
                        <div class="font-medium">${ev.title}</div>
                        <div class="font-mono text-emerald-400">${ev.startTime}</div>
                    </div>
                `
                container.appendChild(div)
            })
        }

        // Day Plan (unchanged)
        function renderDayPlan() {
            const date = new Date(currentDayPlanDate)
            document.getElementById('day-plan-date').textContent = date.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' })
            document.getElementById('day-plan-dayname').textContent = date.toLocaleDateString('en-IN', { weekday: 'long' })

            const container = document.getElementById('day-plan-timeline')
            container.innerHTML = ''

            for (let h = 0; h < 24; h++) {
                const label = document.createElement('div')
                label.className = 'time-label'
                label.style.top = `${h * 60}px`
                label.textContent = `${h}:00`
                container.appendChild(label)
            }

            const dayEvents = events.filter(e => e.date === currentDayPlanDate)

            dayEvents.forEach(ev => {
                const [sh, sm] = ev.startTime.split(':').map(Number)
                const startMin = sh * 60 + sm
                const [eh, em] = ev.endTime.split(':').map(Number)
                const duration = Math.max(eh * 60 + em - startMin, 30)

                const slot = document.createElement('div')
                slot.className = 'slot-bar'
                slot.style.top = `${startMin}px`
                slot.style.height = `${duration}px`
                slot.innerHTML = `
                    <div class="flex justify-between items-start text-sm">
                        <div>
                            <div class="font-medium">${ev.title}</div>
                            <div class="font-mono text-emerald-400 text-xs">${ev.startTime} – ${ev.endTime}</div>
                        </div>
                        <button onclick="deleteEvent(${ev.id}); event.stopImmediatePropagation()" class="text-red-400 text-xl leading-none">×</button>
                    </div>
                `
                container.appendChild(slot)
            })
        }

        // Week View - Matched to your screenshot
        function renderWeekView() {
            const start = new Date(currentWeekStart)
            start.setDate(start.getDate() - start.getDay() + 1)

            document.getElementById('week-title').innerHTML = `Week of ${start.toLocaleDateString('en-IN', {day:'numeric', month:'short'})} – ${new Date(start.getTime() + 6*86400000).toLocaleDateString('en-IN', {day:'numeric', month:'short'})}`

            const grid = document.getElementById('week-grid')
            grid.innerHTML = ''

            for (let i = 0; i < 7; i++) {
                const dayDate = new Date(start)
                dayDate.setDate(dayDate.getDate() + i)
                const dateStr = dayDate.toISOString().slice(0,10)

                const col = document.createElement('div')
                col.className = 'week-day-card'

                col.innerHTML = `
                    <div class="p-4 border-b border-[#21262d] text-center bg-[#0d1117]">
                        <div class="text-xs text-[#8b949e]">${dayDate.toLocaleString('default', {weekday: 'short'})}</div>
                        <div class="text-2xl font-semibold ${dateStr === new Date().toISOString().slice(0,10) ? 'text-[#58a6ff]' : ''}">${dayDate.getDate()}</div>
                    </div>
                `

                const dayEvents = events.filter(e => e.date === dateStr)
                    .sort((a,b) => a.startTime.localeCompare(b.startTime))

                const content = document.createElement('div')
                content.className = 'p-4 space-y-3'

                if (dayEvents.length === 0) {
                    content.innerHTML = `<div class="text-center py-12 text-[#8b949e] text-sm">No events</div>`
                } else {
                    dayEvents.forEach(ev => {
                        content.innerHTML += `
                            <div onclick="editEvent(${ev.id}); event.stopImmediatePropagation()" 
                                 class="week-event-bar flex justify-between items-center">
                                <div>
                                    <div class="font-medium text-sm">${ev.title}</div>
                                    <div class="text-xs text-emerald-400">${ev.startTime} - ${ev.endTime}</div>
                                </div>
                                <button onclick="deleteEvent(${ev.id}); event.stopImmediatePropagation()" class="text-red-400 text-xl">🗑️</button>
                            </div>
                        `
                    })
                }
                col.appendChild(content)
                grid.appendChild(col)
            }
        }

        function prevWeek() { currentWeekStart.setDate(currentWeekStart.getDate() - 7); renderWeekView(); }
        function nextWeek() { currentWeekStart.setDate(currentWeekStart.getDate() + 7); renderWeekView(); }

        // Schedule Templates with multi-day support
        function openScheduleTemplateModal() {
            if (!templates.length) templates = [{ id: Date.now(), name: "Default Schedule", slots: [] }]
            currentTemplateIndex = 0
            renderTemplateList()
            renderCurrentTemplateSlots()
            document.getElementById('schedule-template-modal').classList.remove('hidden')
            document.getElementById('schedule-template-modal').classList.add('flex')
        }

        function hideScheduleModal() {
            const modal = document.getElementById('schedule-template-modal')
            modal.classList.add('hidden')
            modal.classList.remove('flex')
            saveData()
        }

        function renderTemplateList() {
            const container = document.getElementById('template-list')
            container.innerHTML = ''
            templates.forEach((t, i) => {
                const btn = document.createElement('button')
                btn.className = `px-5 py-2 rounded-2xl text-sm whitespace-nowrap ${i === currentTemplateIndex ? 'bg-[#58a6ff] text-white' : 'bg-[#21262d] hover:bg-[#30363d]'}`
                btn.textContent = t.name
                btn.onclick = () => { currentTemplateIndex = i; renderTemplateList(); renderCurrentTemplateSlots(); }
                container.appendChild(btn)
            })
        }

        function renderCurrentTemplateSlots() {
            const container = document.getElementById('template-slots-list')
            container.innerHTML = ''
            const current = templates[currentTemplateIndex]
            document.getElementById('current-template-name').value = current.name

            current.slots.forEach((slot, i) => {
                const row = document.createElement('div')
                row.className = 'flex items-center gap-3 bg-[#21262d] rounded-2xl p-4'
                row.innerHTML = `
                    <input type="text" value="${slot.title}" oninput="templates[${currentTemplateIndex}].slots[${i}].title=this.value" class="flex-1 bg-transparent outline-none">
                    <input type="time" value="${slot.start}" oninput="templates[${currentTemplateIndex}].slots[${i}].start=this.value" class="bg-[#0d1117] rounded-xl px-4 py-2 w-28 text-sm">
                    <span class="text-[#8b949e]">→</span>
                    <input type="time" value="${slot.end}" oninput="templates[${currentTemplateIndex}].slots[${i}].end=this.value" class="bg-[#0d1117] rounded-xl px-4 py-2 w-28 text-sm">
                    <input type="text" value="${slot.days || 'Mon-Fri'}" oninput="templates[${currentTemplateIndex}].slots[${i}].days=this.value" class="bg-[#0d1117] rounded-xl px-4 py-2 w-24 text-sm" placeholder="Days">
                    <button onclick="removeTemplateSlot(${i});event.stopImmediatePropagation()" class="text-red-400 text-xl">×</button>
                `
                container.appendChild(row)
            })
        }

        function createNewTemplate() {
            const newTemplate = { id: Date.now(), name: `Schedule ${templates.length + 1}`, slots: [] }
            templates.push(newTemplate)
            currentTemplateIndex = templates.length - 1
            renderTemplateList()
            renderCurrentTemplateSlots()
        }

        function addTemplateSlot() {
            templates[currentTemplateIndex].slots.push({title: "New Slot", start: "09:00", end: "10:00", days: "Mon-Fri"})
            renderCurrentTemplateSlots()
        }

        function removeTemplateSlot(i) {
            templates[currentTemplateIndex].slots.splice(i, 1)
            renderCurrentTemplateSlots()
        }

        function applyCurrentTemplate() {
            const date = currentDayPlanDate
            const current = templates[currentTemplateIndex]
            current.slots.forEach(slot => {
                events.push({
                    id: Date.now() + Math.random() * 100000,
                    title: slot.title,
                    date: date,
                    startTime: slot.start,
                    endTime: slot.end,
                    description: `From ${current.name}`,
                    alarm: 10
                })
            })
            saveData()
            hideScheduleModal()
            renderDayPlan()
            showToast(`Applied <strong>${current.name}</strong>`, 2500)
        }

        // Common functions
        function prevMonth() { currentMonth--; if(currentMonth<0){currentMonth=11; currentYear--;} renderCalendar(); }
        function nextMonth() { currentMonth++; if(currentMonth>11){currentMonth=0; currentYear++;} renderCalendar(); }
        function goToToday() {
            const now = new Date()
            currentMonth = now.getMonth()
            currentYear = now.getFullYear()
            selectedDateForSidebar = now.toISOString().slice(0,10)
            renderCalendar()
        }

        function prevDayPlan() {
            let d = new Date(currentDayPlanDate)
            d.setDate(d.getDate() - 1)
            currentDayPlanDate = d.toISOString().slice(0,10)
            renderDayPlan()
        }

        function nextDayPlan() {
            let d = new Date(currentDayPlanDate)
            d.setDate(d.getDate() + 1)
            currentDayPlanDate = d.toISOString().slice(0,10)
            renderDayPlan()
        }

        function goToTodayInDayPlan() {
            currentDayPlanDate = new Date().toISOString().slice(0,10)
            renderDayPlan()
        }

        function showAddEventModal() {
            editingEventId = null
            document.getElementById('modal-title').textContent = 'New Event'
            document.getElementById('event-date').value = selectedDateForSidebar || currentDayPlanDate || new Date().toISOString().slice(0,10)
            document.getElementById('event-title').value = ''
            document.getElementById('event-desc').value = ''
            document.getElementById('event-start').value = '09:00'
            document.getElementById('event-end').value = '10:00'
            document.getElementById('event-alarm').value = '10'
            document.getElementById('event-modal').classList.remove('hidden')
            document.getElementById('event-modal').classList.add('flex')
        }

        function hideModal() {
            const modal = document.getElementById('event-modal')
            modal.classList.add('hidden')
            modal.classList.remove('flex')
        }

        function saveEvent() {
            const title = document.getElementById('event-title').value.trim()
            if (!title) return showToast('Title required')

            const newEvent = {
                id: editingEventId || Date.now(),
                title: title,
                date: document.getElementById('event-date').value,
                startTime: document.getElementById('event-start').value,
                endTime: document.getElementById('event-end').value,
                description: document.getElementById('event-desc').value.trim(),
                alarm: parseInt(document.getElementById('event-alarm').value) || 0
            }

            if (editingEventId) {
                const idx = events.findIndex(e => e.id === editingEventId)
                if (idx > -1) events[idx] = newEvent
            } else {
                events.push(newEvent)
            }

            saveData()
            hideModal()
            renderAllViews()
            showToast('Event saved')
        }

        function editEvent(id) {
            const ev = events.find(e => e.id === id)
            if (!ev) return
            editingEventId = id
            document.getElementById('modal-title').textContent = 'Edit Event'
            document.getElementById('event-title').value = ev.title
            document.getElementById('event-date').value = ev.date
            document.getElementById('event-start').value = ev.startTime
            document.getElementById('event-end').value = ev.endTime
            document.getElementById('event-desc').value = ev.description || ''
            document.getElementById('event-alarm').value = ev.alarm || 0
            document.getElementById('event-modal').classList.remove('hidden')
            document.getElementById('event-modal').classList.add('flex')
        }

        function deleteEvent(id) {
            if (confirm('Delete permanently?')) {
                events = events.filter(e => e.id !== id)
                saveData()
                renderAllViews()
                showToast('Deleted')
            }
        }

        function renderEventsTable(filter = '') {
            const tbody = document.getElementById('events-table')
            tbody.innerHTML = ''
            let filtered = events
            if (filter) filtered = events.filter(e => e.title.toLowerCase().includes(filter.toLowerCase()))

            filtered.sort((a,b) => a.date.localeCompare(b.date) || a.startTime.localeCompare(b.startTime))

            filtered.forEach(ev => {
                const row = document.createElement('tr')
                row.className = 'hover:bg-[#161b22]'
                row.innerHTML = `
                    <td class="py-5 px-6">${new Date(ev.date).toLocaleDateString('en-IN', {day:'numeric', month:'short'})}</td>
                    <td class="py-5 px-6 font-mono">${ev.startTime}–${ev.endTime}</td>
                    <td class="py-5 px-6 font-medium">${ev.title}</td>
                    <td class="py-5 px-6">${ev.alarm ? `🛎️ ${ev.alarm} min` : '—'}</td>
                    <td class="py-5 px-6 text-right"><button onclick="editEvent(${ev.id});event.stopImmediatePropagation()" class="text-[#58a6ff]">Edit</button></td>
                `
                tbody.appendChild(row)
            })
        }

        function renderAlarms() {
            const container = document.getElementById('alarms-list')
            container.innerHTML = ''
            const active = events.filter(e => e.alarm > 0)
            document.getElementById('alarm-count-badge').textContent = active.length

            if (active.length === 0) {
                container.innerHTML = `<div class="bg-[#21262d] rounded-3xl p-12 text-center text-[#8b949e]">No active alarms</div>`
                return
            }

            active.forEach(ev => {
                const card = document.createElement('div')
                card.className = 'bg-[#21262d] rounded-3xl p-6 flex justify-between items-center'
                card.innerHTML = `
                    <div>
                        <div class="font-semibold">${ev.title}</div>
                        <div class="text-sm text-[#8b949e]">${new Date(ev.date).toLocaleDateString('en-IN')} • ${ev.startTime}</div>
                    </div>
                    <div class="text-emerald-400">🛎️ ${ev.alarm} min</div>
                `
                container.appendChild(card)
            })
        }

        function renderAllViews() {
            renderCalendar()
            renderSidebar()
            renderDayPlan()
            renderWeekView()
            renderEventsTable()
            renderAlarms()
        }

        function switchTab(tab) {
            document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'))
            document.getElementById(`view-${tab}`).classList.remove('hidden')

            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('bg-[#21262d]'))
            document.getElementById(`tab-${tab}`).classList.add('bg-[#21262d]')

            if (tab === 0) { renderCalendar(); renderSidebar(); }
            if (tab === 1) renderDayPlan()
            if (tab === 2) renderWeekView()
            if (tab === 3) renderEventsTable()
            if (tab === 4) renderAlarms()
        }

        function filterEvents() {
            const term = document.getElementById('search-input').value
            renderEventsTable(term)
        }

        function exportData() {
            if (!events.length) return showToast('No events')
            const str = JSON.stringify(events, null, 2)
            const blob = new Blob([str], {type: 'application/json'})
            const url = URL.createObjectURL(blob)
            const a = document.createElement('a')
            a.href = url
            a.download = `samayam-backup-${new Date().toISOString().slice(0,10)}.json`
            a.click()
            showToast('Exported')
        }

        function importData(e) {
            const file = e.target.files[0]
            if (!file) return
            const reader = new FileReader()
            reader.onload = ev => {
                try {
                    events = JSON.parse(ev.target.result)
                    saveData()
                    renderAllViews()
                    showToast(`Imported ${events.length} events`)
                } catch(err) {
                    showToast('Invalid file')
                }
            }
            reader.readAsText(file)
        }

        // Init
        window.onload = () => {
            loadData()
            renderAllViews()
            switchTab(2) // Start on Week View to match your screenshot
            showToast('Samayam Beta 1.0 • Multi-day Schedules Ready', 2200)
        }
    </script>
</body>
</html>
